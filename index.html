<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChipInsight 2026 · 芯片行业发展前沿调研平台</title>
    <!-- 内容安全策略 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #161d2a;
            --bg-card-hover: #1c2435;
            --border: #1e2d45;
            --border-light: #263348;
            --accent: #00d4ff;
            --accent2: #6c5ce7;
            --accent3: #00e5a0;
            --accent4: #ff6b6b;
            --accent5: #ffa94d;
            --text-primary: #e2e8f0;
            --text-secondary: #a0b4cc;
            --text-muted: #64748b;
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
            --font-sans: 'Inter', 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', system-ui, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Canvas粒子背景 */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.55;
        }

        .app-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ============ 登录/注册卡片 ============ */
        .auth-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(5, 8, 15, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: opacity 0.4s ease;
        }
        .auth-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .auth-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px 36px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }
        .auth-card::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .auth-card::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: -40px;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, rgba(108, 92, 231, 0.07) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }
        .auth-logo .icon-chip {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.4));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        .auth-logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent), #8eb8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .auth-logo .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            margin-top: 2px;
        }
        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border);
            position: relative;
            z-index: 1;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-muted);
            transition: var(--transition);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-family: var(--font-sans);
            letter-spacing: 0.03em;
        }
        .auth-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .auth-tab:hover {
            color: var(--text-secondary);
        }
        .auth-form {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .auth-form.hidden-form {
            display: none;
        }
        .input-group {
            position: relative;
        }
        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: var(--font-sans);
            transition: var(--transition);
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }
        .input-group input::placeholder {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .btn {
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-family: var(--font-sans);
            letter-spacing: 0.03em;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #0098c7, #00b8e6);
            color: #fff;
            box-shadow: 0 4px 16px rgba(0, 180, 220, 0.3);
        }
        .btn-primary:hover {
            box-shadow: 0 6px 24px rgba(0, 200, 240, 0.45);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
        }
        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 212, 255, 0.04);
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 0.8rem;
            border-radius: 20px;
        }
        .btn-danger-sm {
            padding: 6px 14px;
            font-size: 0.75rem;
            border-radius: 20px;
            background: transparent;
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: var(--accent4);
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-danger-sm:hover {
            background: rgba(255, 107, 107, 0.1);
            border-color: var(--accent4);
        }
        .auth-error {
            color: var(--accent4);
            font-size: 0.82rem;
            text-align: center;
            min-height: 20px;
            transition: var(--transition);
        }
        .auth-hint {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }

        /* ============ 仪表盘 ============ */
        .dashboard {
            display: none;
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .dashboard.active {
            display: block;
        }
        .dashboard-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding: 20px 24px;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
        }
        .dash-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .dash-logo .icon {
            font-size: 32px;
        }
        .dash-logo h2 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }
        .dash-logo .ver {
            font-size: 0.7rem;
            color: var(--accent5);
            font-weight: 600;
            letter-spacing: 0.06em;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            padding: 8px 14px;
            border-radius: 24px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: #fff;
        }
        .search-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 6px 16px;
            transition: var(--transition);
            min-width: 260px;
        }
        .search-bar:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.08);
        }
        .search-bar input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            font-family: var(--font-sans);
            flex: 1;
            min-width: 140px;
        }
        .search-bar input::placeholder {
            color: var(--text-muted);
        }
        .search-icon {
            color: var(--text-muted);
            font-size: 1rem;
            flex-shrink: 0;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            transition: var(--transition);
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover {
            border-color: var(--border-light);
            box-shadow: var(--shadow-card);
            transform: translateY(-2px);
            background: var(--bg-card-hover);
        }
        .stat-card .stat-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            font-family: var(--font-mono);
        }
        .stat-card .stat-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 2px;
            letter-spacing: 0.03em;
        }
        .stat-card.accent-blue .stat-value { color: var(--accent); }
        .stat-card.accent-purple .stat-value { color: var(--accent2); }
        .stat-card.accent-green .stat-value { color: var(--accent3); }
        .stat-card.accent-orange .stat-value { color: var(--accent5); }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
        }
        @media (max-width: 1100px) {
            .main-content { grid-template-columns: 1fr; }
        }
        .content-left {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .section-title {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: pulse-dot 1.8s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% { box-shadow: 0 0 6px var(--accent); }
            50% { box-shadow: 0 0 18px var(--accent), 0 0 30px rgba(0, 212, 255, 0.5); }
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }
        .info-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
        }
        .info-card:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
            background: var(--bg-card-hover);
        }
        .card-tag {
            display: inline-block;
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 14px;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .tag-process { background: rgba(0, 212, 255, 0.12); color: var(--accent); border: 1px solid rgba(0, 212, 255, 0.3); }
        .tag-ai { background: rgba(108, 92, 231, 0.12); color: var(--accent2); border: 1px solid rgba(108, 92, 231, 0.3); }
        .tag-package { background: rgba(0, 229, 160, 0.12); color: var(--accent3); border: 1px solid rgba(0, 229, 160, 0.3); }
        .tag-arch { background: rgba(255, 169, 77, 0.12); color: var(--accent5); border: 1px solid rgba(255, 169, 77, 0.3); }
        .tag-quantum { background: rgba(255, 107, 107, 0.12); color: var(--accent4); border: 1px solid rgba(255, 107, 107, 0.3); }
        .info-card h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
        .info-card p { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .card-meta { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.72rem; color: var(--text-muted); }

        .detail-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            box-shadow: var(--shadow-card);
        }
        .detail-panel h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
        .detail-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 16px; }
        .detail-section { margin-bottom: 16px; }
        .detail-section h5 { font-size: 0.78rem; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
        .detail-section p,
        .detail-section li { font-size: 0.82rem; color: var(--text-secondary); }
        .detail-section ul { list-style: none; padding: 0; }
        .detail-section ul li { padding: 4px 0 4px 16px; position: relative; }
        .detail-section ul li::before { content: '▸'; position: absolute; left: 0; color: var(--accent); font-size: 0.65rem; }
        .detail-empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .detail-empty .icon { font-size: 48px; display: block; margin-bottom: 12px; opacity: 0.5; }
        .trend-mini-bar { display: flex; align-items: flex-end; gap: 6px; height: 60px; margin-top: 8px; }
        .trend-mini-bar .bar { flex: 1; border-radius: 4px 4px 0 0; min-width: 6px; background: linear-gradient(to top, var(--accent), rgba(0, 212, 255, 0.3)); }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
            opacity: 0;
            transform: translateX(40px);
            transition: all 0.35s ease;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast.success { background: #0d7c4b; }
        .toast.error { background: #b83a3a; }
        .toast.info { background: #1a5f8a; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 10px; }
    </style>
</head>
<body>
    <!-- 防嵌套脚本 -->
    <script>
        if (window.top !== window.self) {
            window.top.location = window.self.location;
        }
    </script>
    <canvas id="particleCanvas"></canvas>
    <div class="toast" id="toast"></div>

    <!-- 登录注册 -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="icon-chip">🔬</span>
                <h1>ChipInsight 2026</h1>
                <p class="subtitle">芯片行业发展前沿 · 调研平台</p>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLogin">登 录</button>
                <button class="auth-tab" id="tabRegister">注 册</button>
            </div>
            <form class="auth-form" id="loginForm">
                <div class="input-group">
                    <label>👤 用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" required autocomplete="username" maxlength="20">
                </div>
                <div class="input-group">
                    <label>🔒 密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required autocomplete="current-password">
                </div>
                <div class="auth-error" id="loginError"></div>
                <button type="submit" class="btn btn-primary" id="loginBtn">🔐 登录平台</button>
            </form>
            <form class="auth-form hidden-form" id="registerForm">
                <div class="input-group">
                    <label>👤 用户名</label>
                    <input type="text" id="regUsername" placeholder="4-20位字母、数字或中文" required minlength="4" maxlength="20" pattern="[a-zA-Z0-9\u4e00-\u9fa5_]+" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>📧 邮箱（选填）</label>
                    <input type="email" id="regEmail" placeholder="用于找回密码（可选）" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>🔒 密码</label>
                    <input type="password" id="regPassword" placeholder="至少6位" required minlength="6" autocomplete="new-password">
                </div>
                <div class="input-group">
                    <label>🔒 确认密码</label>
                    <input type="password" id="regPasswordConfirm" placeholder="再次输入密码" required minlength="6" autocomplete="new-password">
                </div>
                <div class="auth-error" id="registerError"></div>
                <button type="submit" class="btn btn-primary">📝 创建账号</button>
            </form>
        </div>
    </div>

    <!-- 仪表盘 -->
    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <div class="dash-logo">
                <span class="icon">🔬</span>
                <div>
                    <h2>ChipInsight 2026 <span class="ver">正式版</span></h2>
                    <span style="font-size:0.72rem;color:var(--text-muted);">芯片行业发展前沿调研平台</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="search-bar">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="搜索芯片技术、制程、架构..." oninput="handleSearch()">
                </div>
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <span id="userDisplayName">admin</span>
                </div>
                <button class="btn btn-outline btn-sm" onclick="handleLogout()">退出登录</button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-card accent-blue">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="statTechCount">46</div>
                <div class="stat-label">前沿技术条目</div>
            </div>
            <div class="stat-card accent-purple">
                <div class="stat-icon">🏭</div>
                <div class="stat-value">2nm</div>
                <div class="stat-label">最先进制程节点</div>
            </div>
            <div class="stat-card accent-green">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="statUserCount">0</div>
                <div class="stat-label">注册用户数量</div>
            </div>
            <div class="stat-card accent-orange">
                <div class="stat-icon">🌐</div>
                <div class="stat-value">10+</div>
                <div class="stat-label">覆盖细分领域</div>
            </div>
        </div>

        <div class="main-content">
            <div class="content-left">
                <div class="section-title">
                    <span class="dot"></span> 芯片行业前沿技术概览（2026）
                </div>
                <div class="card-grid" id="cardGrid"></div>
            </div>
            <div class="detail-panel" id="detailPanel">
                <div class="detail-empty">
                    <span class="icon">📋</span>
                    <p>👈 点击左侧卡片查看详情</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // 粒子背景
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const particleCount = 70;

            function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resizeCanvas();
            window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });

            function initParticles() {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: (Math.random() - 0.5) * 0.5,
                        radius: Math.random() * 1.8 + 0.4,
                        opacity: Math.random() * 0.5 + 0.15,
                    });
                }
            }
            initParticles();

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0,200,240,${p.opacity})`;
                    ctx.fill();
                });
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            // Toast
            function showToast(msg, type = 'info') {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.className = 'toast ' + type + ' show';
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
            }

            // ---------- 安全工具 ----------
            async function sha256(message) {
                const msgBuffer = new TextEncoder().encode(message);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                return Array.from(new Uint8Array(hashBuffer), b => b.toString(16).padStart(2, '0')).join('');
            }

            function generateSalt() {
                return Array.from(crypto.getRandomValues(new Uint8Array(16)), b => b.toString(16).padStart(2, '0')).join('');
            }

            async function hashPassword(password, salt) {
                return await sha256(password + salt);
            }

            // 用户存储
            const USERS_KEY = 'chipinsight_users_v2';
            const CURRENT_USER_KEY = 'chipinsight_current_user';
            const LOCKOUT_THRESHOLD = 5;
            const LOCKOUT_DURATION_MIN = 5;

            function getUsers() {
                try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch { return {}; }
            }

            function saveUsers(users) { localStorage.setItem(USERS_KEY, JSON.stringify(users)); }

            function updateUserStats() {
                const count = Object.keys(getUsers()).length;
                const el = document.getElementById('statUserCount');
                if (el) el.textContent = count;
            }

            // 初始化默认账号（仅首次，使用安全盐）
            async function initDefaultAccounts() {
                const users = getUsers();
                if (Object.keys(users).length > 0) return;
                const defaultAccounts = [
                    { username: 'admin', password: 'test123' },
                    { username: 'researcher', password: 'chip2026' }
                ];
                for (const acc of defaultAccounts) {
                    const salt = generateSalt();
                    const hash = await hashPassword(acc.password, salt);
                    users[acc.username] = {
                        salt,
                        hash,
                        email: '',
                        createdAt: new Date().toISOString(),
                        role: 'user',
                        failedAttempts: 0,
                        lockUntil: null
                    };
                }
                saveUsers(users);
            }

            // 检查账号锁定
            function isLockedOut(user) {
                if (!user.lockUntil) return false;
                return new Date(user.lockUntil) > new Date();
            }

            function getUser(username) {
                return getUsers()[username] || null;
            }

            function setCurrentUser(username) {
                localStorage.setItem(CURRENT_USER_KEY, JSON.stringify({ username, loginTime: new Date().toISOString() }));
            }

            function clearCurrentUser() { localStorage.removeItem(CURRENT_USER_KEY); }

            function getCurrentUser() {
                try { return JSON.parse(localStorage.getItem(CURRENT_USER_KEY)); } catch { return null; }
            }

            // ============ 芯片数据库 ============
            const chipDatabase = [
                { id: 'advanced-process-2nm', title: '2nm GAA 先进制程', tag: 'tag-process', tagText: '先进制程', icon: '🏗️', summary: '2026年，2nm GAA技术进入量产，性能与能效大幅提升。', details: { '技术概述':'GAA晶体管取代FinFET，实现更好静电控制。','关键指标':['晶体管密度：~330 MTr/mm²','性能提升：+25%','能效优化：-35%'],'主要参与者':'台积电、三星、英特尔','应用领域':'HPC、AI训练芯片、旗舰SoC' }, year: '2026' },
                { id: 'ai-chip-npu-2026', title: 'AI专用加速芯片', tag: 'tag-ai', tagText: 'AI芯片', icon: '🧠', summary: 'AI加速器算力突破10 PFLOPS，存算一体架构商用。', details: { '技术概述':'专用NPU/TPU采用Chiplet整合HBM4。','关键指标':['算力：8-15 PFLOPS','能效比：4-8 TOPS/W','HBM4带宽：1.5-2 TB/s'],'应用领域':'大模型训练、自动驾驶' }, year: '2026' },
                { id: 'advanced-packaging-3dic', title: '3D IC与先进封装', tag: 'tag-package', tagText: '先进封装', icon: '📦', summary: 'Hybrid Bonding堆叠超12层，互连密度飞跃。', details: { '技术概述':'TSV与混合键合实现垂直堆叠。','关键指标':['堆叠层数：8-16层','互连间距：<1μm'],'主要参与者':'台积电、英特尔、三星' }, year: '2026' },
                { id: 'chiplet-ucie-eco', title: 'Chiplet与UCIe生态', tag: 'tag-arch', tagText: '架构创新', icon: '🧩', summary: 'UCIe 2.0标准普及，异构集成时代来临。', details: { '技术概述':'小芯片通过标准接口高速通信。','关键指标':['带宽：>64 GB/s','互连功耗：<0.5 pJ/bit'],'发展趋势':'生态伙伴超150家' }, year: '2026' },
                { id: 'compute-in-memory', title: '存算一体技术', tag: 'tag-ai', tagText: 'AI芯片', icon: '💾', summary: '突破冯·诺依曼瓶颈，边缘AI能效飙升。', details: { '技术概述':'存储器内直接计算。','关键指标':['能效比：20-100 TOPS/W','延迟降低10-100x'],'应用领域':'边缘AI、物联网' }, year: '2026' },
                { id: 'riscv-ecosystem', title: 'RISC-V架构崛起', tag: 'tag-arch', tagText: '架构创新', icon: '🔧', summary: '从嵌入式向服务器渗透，出货量超百亿。', details: { '技术概述':'开放指令集，灵活无授权费。','关键指标':['服务器级64核+','工艺5nm/3nm'],'主要参与者':'SiFive、阿里平头哥' }, year: '2026' },
                { id: 'silicon-photonics', title: '硅光子互连', tag: 'tag-package', tagText: '先进互连', icon: '💡', summary: '1.6Tbps光模块商用，CPO技术成熟。', details: { '技术概述':'CMOS工艺制造光学元件。','关键指标':['速率：1.6 Tbps','能效：<1 pJ/bit'],'应用领域':'数据中心、HPC' }, year: '2026' },
                { id: 'wide-bandgap', title: '宽禁带半导体', tag: 'tag-process', tagText: '功率半导体', icon: '⚡', summary: 'GaN/SiC在电动车和AI电源中普及。', details: { '技术概述':'高击穿电场和高热导率。','关键指标':['SiC MOSFET >1700V','GaN HEMT >650V'],'市场规模':'超150亿美元' }, year: '2026' },
                { id: 'quantum-chip', title: '量子计算芯片', tag: 'tag-quantum', tagText: '量子计算', icon: '⚛️', summary: '超导量子比特超2000个，纠错里程碑。', details: { '技术概述':'利用量子比特叠加与纠缠。','关键指标':['超导量子比特2000+','保真度>99.9%'],'应用领域':'密码学、材料模拟' }, year: '2026' },
                { id: 'neuromorphic', title: '神经形态芯片', tag: 'tag-ai', tagText: 'AI芯片', icon: '🧬', summary: '百万神经元集成，事件驱动超低功耗。', details: { '技术概述':'模拟脉冲神经网络。','关键指标':['神经元>100万','能效<0.1 mW/M'],'应用领域':'机器人、无人机' }, year: '2026' }
            ];
            const totalTechCount = chipDatabase.length;

            // 渲染卡片
            function renderCards(filterText = '') {
                const grid = document.getElementById('cardGrid');
                const term = filterText.toLowerCase().trim();
                let filtered = chipDatabase;
                if (term) {
                    filtered = chipDatabase.filter(item => (item.title + item.summary + item.tagText).toLowerCase().includes(term));
                }
                if (filtered.length === 0) {
                    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);"><span style="font-size:40px;">🔍</span><p>无匹配结果</p></div>`;
                    return;
                }
                grid.innerHTML = filtered.map(item => `
                <div class="info-card" onclick="selectCard('${item.id}')" data-id="${item.id}">
                    <span class="card-tag ${item.tag}">${item.tagText}</span>
                    <h4>${item.icon} ${escapeHtml(item.title)}</h4>
                    <p>${escapeHtml(item.summary)}</p>
                    <div class="card-meta"><span>📅 ${item.year}</span><span>📖 公开数据</span></div>
                </div>`).join('');
            }

            function selectCard(id) {
                const item = chipDatabase.find(c => c.id === id);
                if (!item) return;
                const panel = document.getElementById('detailPanel');
                panel.dataset.selectedId = id;
                let html = `<h3>${item.icon} ${escapeHtml(item.title)}</h3><p class="detail-subtitle">${item.tagText} · ${item.year}</p>`;
                for (const [key, val] of Object.entries(item.details)) {
                    if (Array.isArray(val)) html += `<div class="detail-section"><h5>${key}</h5><ul>${val.map(v=>`<li>${escapeHtml(v)}</li>`).join('')}</ul></div>`;
                    else html += `<div class="detail-section"><h5>${key}</h5><p>${escapeHtml(String(val))}</p></div>`;
                }
                panel.innerHTML = html;
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // 认证逻辑
            const authOverlay = document.getElementById('authOverlay');
            const dashboard = document.getElementById('dashboard');

            window.switchAuthTab = function(tab) {
                const tabLogin = document.getElementById('tabLogin');
                const tabRegister = document.getElementById('tabRegister');
                const loginForm = document.getElementById('loginForm');
                const registerForm = document.getElementById('registerForm');
                if (tab === 'login') {
                    tabLogin.classList.add('active'); tabRegister.classList.remove('active');
                    loginForm.classList.remove('hidden-form'); registerForm.classList.add('hidden-form');
                } else {
                    tabRegister.classList.add('active'); tabLogin.classList.remove('active');
                    registerForm.classList.remove('hidden-form'); loginForm.classList.add('hidden-form');
                }
            };

            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;
                const errorEl = document.getElementById('loginError');
                errorEl.textContent = '';
                if (!username || !password) { errorEl.textContent = '请填写完整'; return; }

                const user = getUser(username);
                if (!user) { errorEl.textContent = '用户不存在'; return; }
                if (isLockedOut(user)) {
                    errorEl.textContent = '账号已锁定，请稍后再试';
                    return;
                }
                const hash = await hashPassword(password, user.salt);
                if (hash !== user.hash) {
                    user.failedAttempts = (user.failedAttempts || 0) + 1;
                    if (user.failedAttempts >= LOCKOUT_THRESHOLD) {
                        user.lockUntil = new Date(Date.now() + LOCKOUT_DURATION_MIN * 60 * 1000).toISOString();
                        errorEl.textContent = `密码错误次数过多，已锁定${LOCKOUT_DURATION_MIN}分钟`;
                    } else {
                        errorEl.textContent = `密码错误，剩余尝试次数：${LOCKOUT_THRESHOLD - user.failedAttempts}`;
                    }
                    const users = getUsers();
                    users[username] = user;
                    saveUsers(users);
                    return;
                }
                // 登录成功
                user.failedAttempts = 0;
                user.lockUntil = null;
                const users = getUsers();
                users[username] = user;
                saveUsers(users);
                setCurrentUser(username);
                showToast('✅ 登录成功', 'success');
                showDashboard(username);
            });

            document.getElementById('registerForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const username = document.getElementById('regUsername').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const password = document.getElementById('regPassword').value;
                const passwordConfirm = document.getElementById('regPasswordConfirm').value;
                const errorEl = document.getElementById('registerError');
                errorEl.textContent = '';
                if (password !== passwordConfirm) { errorEl.textContent = '两次密码不一致'; return; }
                if (password.length < 6) { errorEl.textContent = '密码至少6位'; return; }
                if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { errorEl.textContent = '邮箱格式不正确'; return; }
                const users = getUsers();
                if (users[username]) { errorEl.textContent = '用户名已存在'; return; }
                const salt = generateSalt();
                const hash = await hashPassword(password, salt);
                users[username] = {
                    salt,
                    hash,
                    email: email || '',
                    createdAt: new Date().toISOString(),
                    role: 'user',
                    failedAttempts: 0,
                    lockUntil: null
                };
                saveUsers(users);
                setCurrentUser(username);
                showToast('🎉 注册成功', 'success');
                showDashboard(username);
            });

            function showDashboard(username) {
                authOverlay.classList.add('hidden');
                dashboard.classList.add('active');
                document.getElementById('userDisplayName').textContent = username;
                document.getElementById('userAvatar').textContent = username.charAt(0).toUpperCase();
                document.getElementById('statTechCount').textContent = totalTechCount;
                updateUserStats();
                document.getElementById('searchInput').value = '';
                document.getElementById('detailPanel').innerHTML = '<div class="detail-empty"><span class="icon">📋</span><p>👈 点击卡片查看详情</p></div>';
                renderCards();
            }

            window.handleLogout = function() {
                clearCurrentUser();
                dashboard.classList.remove('active');
                authOverlay.classList.remove('hidden');
                document.getElementById('loginForm').reset();
                document.getElementById('registerForm').reset();
                document.getElementById('loginError').textContent = '';
                document.getElementById('registerError').textContent = '';
                window.switchAuthTab('login');
                showToast('👋 已安全退出', 'info');
            };

            window.handleSearch = function() {
                renderCards(document.getElementById('searchInput').value);
            };

            // 启动
            async function init() {
                await initDefaultAccounts();
                const current = getCurrentUser();
                if (current && current.username && getUser(current.username)) {
                    showDashboard(current.username);
                } else {
                    authOverlay.classList.remove('hidden');
                    dashboard.classList.remove('active');
                    window.switchAuthTab('login');
                }
            }
            init();
            console.log('🔬 ChipInsight 2026 发布版已就绪');
        })();
    </script>
</body>
</html>
